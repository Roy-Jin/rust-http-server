name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.architecture }}
    strategy:
      matrix:
        include:
          # Linux platforms
          - os: ubuntu-latest
            platform: linux
            architecture: x86_64
            target: x86_64-unknown-linux-gnu
            cross: false
            binary_name: http-server-linux-x86_64
            binary_path: target/x86_64-unknown-linux-gnu/release/http-server
            
          - os: ubuntu-latest
            platform: linux
            architecture: aarch64
            target: aarch64-unknown-linux-gnu
            cross: true
            binary_name: http-server-linux-aarch64
            binary_path: target/aarch64-unknown-linux-gnu/release/http-server
            
          # Windows platforms
          - os: windows-latest
            platform: windows
            architecture: x86_64
            target: x86_64-pc-windows-msvc
            cross: false
            binary_name: http-server-windows-x86_64.exe
            binary_path: target\x86_64-pc-windows-msvc\release\http-server.exe
            
          - os: windows-latest
            platform: windows
            architecture: aarch64
            target: aarch64-pc-windows-msvc
            cross: false
            binary_name: http-server-windows-arm64.exe
            binary_path: target\aarch64-pc-windows-msvc\release\http-server.exe
            
          # macOS platforms
          - os: macos-latest
            platform: macos
            architecture: x86_64
            target: x86_64-apple-darwin
            cross: false
            binary_name: http-server-macos-x86_64
            binary_path: target/x86_64-apple-darwin/release/http-server
            
          - os: macos-latest
            platform: macos
            architecture: aarch64
            target: aarch64-apple-darwin
            cross: false
            binary_name: http-server-macos-aarch64
            binary_path: target/aarch64-apple-darwin/release/http-server

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}
      
      - name: Install Cross for cross-compilation
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross
      
      - name: Build binary
        run: |
          ${{ matrix.cross == true && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}
        shell: bash
      
      - name: Create release directory
        run: mkdir -p release
        
      - name: Copy binary to release directory (Linux/macOS)
        if: matrix.os != 'windows'
        run: cp "${{ matrix.binary_path }}" "release/${{ matrix.binary_name }}"
        
      - name: Copy binary to release directory (Windows)
        if: matrix.os == 'windows'
        run: copy "${{ matrix.binary_path }}" "release\\${{ matrix.binary_name }}"
        shell: cmd
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: release/${{ matrix.binary_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag name
        id: get_tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List downloaded files
        run: ls -laR release
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_tag.outputs.TAG_NAME }}
          name: Release ${{ steps.get_tag.outputs.TAG_NAME }}
          body: |
            ## 🚀 Release ${{ steps.get_tag.outputs.TAG_NAME }}

            | Platform | Architecture | Binary Name | Download |
            |----------|--------------|-------------|----------|
            | Linux | x86_64 | `http-server-linux-x86_64` | [Download](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_tag.outputs.TAG_NAME }}/http-server-linux-x86_64) |
            | Linux | ARM64 | `http-server-linux-aarch64` | [Download](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_tag.outputs.TAG_NAME }}/http-server-linux-aarch64) |
            | Windows | x86_64 | `http-server-windows-x86_64.exe` | [Download](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_tag.outputs.TAG_NAME }}/http-server-windows-x86_64.exe) |
            | Windows | ARM64 | `http-server-windows-arm64.exe` | [Download](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_tag.outputs.TAG_NAME }}/http-server-windows-arm64.exe) |
            | macOS | Intel (x86_64) | `http-server-macos-x86_64` | [Download](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_tag.outputs.TAG_NAME }}/http-server-macos-x86_64) |
            | macOS | Apple Silicon (ARM64) | `http-server-macos-aarch64` | [Download](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_tag.outputs.TAG_NAME }}/http-server-macos-aarch64) |

          files: |
            release/http-server-linux-x86_64
            release/http-server-linux-aarch64
            release/http-server-windows-x86_64.exe
            release/http-server-windows-arm64.exe
            release/http-server-macos-x86_64
            release/http-server-macos-aarch64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}